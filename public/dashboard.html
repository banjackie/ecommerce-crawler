<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - 电商爬虫监测</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">EC</div>
                <div class="logo-text">电商监测</div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html" class="active"><span data-icon="dashboard"></span> <span>仪表盘</span></a></li>
                    <li><a href="products.html"><span data-icon="products"></span> <span>产品</span></a></li>
                    <li><a href="index.html"><span data-icon="history"></span> <span>检测历史</span></a></li>
                    <li><a href="settings.html"><span data-icon="settings"></span> <span>设置</span></a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>仪表盘</h1>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">总产品数</div>
                    <div class="stat-value" id="stat-total">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">今日新增</div>
                    <div class="stat-value" id="stat-new">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">子分类</div>
                    <div class="stat-value" id="stat-subcats">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">检测次数</div>
                    <div class="stat-value" id="stat-sessions">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">近期变更</div>
                    <div class="stat-value" id="stat-changes">-</div>
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                <div class="card">
                    <div class="card-body">
                        <h3 style="font-size:15px;margin-bottom:16px;">子分类分布</h3>
                        <div class="chart-container" style="height:220px;">
                            <canvas id="categoryChart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-body">
                        <h3 style="font-size:15px;margin-bottom:16px;">最近变更</h3>
                        <div id="recent-changes" style="max-height:220px;overflow-y:auto;"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        document.querySelectorAll('[data-icon]').forEach(el => {
            const name = el.getAttribute('data-icon');
            if (ICONS[name]) el.innerHTML = ICONS[name];
        });
        setActiveNav();

        async function loadOverview() {
            const stats = await api('/stats/overview');
            document.getElementById('stat-total').textContent = stats.totalProducts.toLocaleString('zh-CN');
            document.getElementById('stat-new').textContent = stats.todayNew.toLocaleString('zh-CN');
            document.getElementById('stat-subcats').textContent = (stats.totalSubcategories || 0).toLocaleString('zh-CN');
            document.getElementById('stat-sessions').textContent = stats.totalSessions.toLocaleString('zh-CN');
            document.getElementById('stat-changes').textContent = (stats.recentChanges || 0).toLocaleString('zh-CN');
        }

        async function loadCategoryChart() {
            const { sessions } = await api('/sessions?limit=1');
            if (!sessions.length) return;
            const stats = sessions[0].category_stats || [];
            if (!stats.length) return;

            const ctx = document.getElementById('categoryChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: stats.map(s => t(s.category)),
                    datasets: [{
                        data: stats.map(s => s.count),
                        backgroundColor: ['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#14b8a6']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { font: { size: 11 } } } }
                }
            });
        }

        async function loadRecentChanges() {
            const container = document.getElementById('recent-changes');
            try {
                const { changes } = await api('/changes?days=7');
                if (!changes.length) {
                    container.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">暂无变更记录</div>';
                    return;
                }
                container.innerHTML = changes.slice(0, 10).map(c => {
                    const badgeMap = {
                        'new': '<span class="badge badge-success" style="font-size:11px;">新增</span>',
                        'removed': '<span class="badge badge-danger" style="font-size:11px;">下架</span>',
                        'price_changed': '<span class="badge badge-warning" style="font-size:11px;">价格</span>',
                    };
                    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">
                        ${badgeMap[c.change_type] || '<span class="badge" style="font-size:11px;">' + c.change_type + '</span>'}
                        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.name || c.external_id}</span>
                        ${c.change_type === 'price_changed' ? `<span style="font-size:11px;color:#dc2626;text-decoration:line-through;">${c.old_value}€</span> <span style="font-size:11px;font-weight:600;color:#15803d;">${c.new_value}€</span>` : ''}
                    </div>`;
                }).join('');
            } catch (e) {
                container.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">加载失败</div>';
            }
        }

        loadOverview();
        loadCategoryChart();
        loadRecentChanges();
    </script>
</body>
</html>
