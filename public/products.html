<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品 - 电商爬虫监测</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">EC</div>
                <div class="logo-text">电商监测</div>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="dashboard.html"><span data-icon="dashboard"></span> <span>仪表盘</span></a></li>
                    <li><a href="products.html" class="active"><span data-icon="products"></span> <span>产品</span></a></li>
                    <li><a href="index.html"><span data-icon="history"></span> <span>检测历史</span></a></li>
                    <li><a href="settings.html"><span data-icon="settings"></span> <span>设置</span></a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>产品列表</h1>
            </div>

            <div class="toolbar">
                <div class="toolbar-row">
                    <div class="search-box">
                        <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
                        <input type="text" id="search-input" placeholder="搜索产品名称或 SKU ID...">
                    </div>
                    <select id="brand-filter" class="filter-select">
                        <option value="">全部品牌</option>
                    </select>
                    <select id="subcategory-filter" class="filter-select">
                        <option value="">全部子分类</option>
                    </select>
                    <select id="sort-select" class="filter-select">
                        <option value="last_seen_at:DESC">最近更新</option>
                        <option value="price:ASC">价格 ↑</option>
                        <option value="price:DESC">价格 ↓</option>
                        <option value="name:ASC">名称 A-Z</option>
                        <option value="name:DESC">名称 Z-A</option>
                        <option value="first_seen_at:DESC">最新上架</option>
                        <option value="first_seen_at:ASC">最早收录</option>
                    </select>
                    <div class="view-toggle">
                        <button class="view-btn active" onclick="setView('list')" title="列表视图" id="view-list-btn">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                        </button>
                        <button class="view-btn" onclick="setView('grid')" title="卡片视图" id="view-grid-btn">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                        </button>
                    </div>
                </div>
                <div class="toolbar-info">
                    <span id="result-count">加载中...</span>
                </div>
            </div>

            <!-- List View -->
            <div class="card" id="list-view">
                <div class="card-body" style="padding:0;overflow-x:auto">
                    <table class="data-table" id="products-table">
                        <thead>
                            <tr>
                                <th style="width:60px">图片</th>
                                <th style="width:100px">SKU</th>
                                <th>名称</th>
                                <th style="width:100px">品牌</th>
                                <th style="width:90px">价格</th>
                                <th style="width:110px">子分类</th>
                                <th style="width:100px">首次发现</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- Grid View -->
            <div class="products-grid-view" id="grid-view" style="display:none"></div>

            <div class="pagination" id="pagination"></div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        document.querySelectorAll('[data-icon]').forEach(el => {
            const name = el.getAttribute('data-icon');
            if (ICONS[name]) el.innerHTML = ICONS[name];
        });
        setActiveNav();

        let currentView = 'list';
        let allBrands = [];
        let allSubcategories = [];

        function setView(view) {
            currentView = view;
            document.getElementById('list-view').style.display = view === 'list' ? '' : 'none';
            document.getElementById('grid-view').style.display = view === 'grid' ? '' : 'none';
            document.getElementById('view-list-btn').classList.toggle('active', view === 'list');
            document.getElementById('view-grid-btn').classList.toggle('active', view === 'grid');
            loadProducts();
        }

        async function loadProducts(page = 1) {
            const search = document.getElementById('search-input').value;
            const subcategory = document.getElementById('subcategory-filter').value;
            const brand = document.getElementById('brand-filter').value;
            const [sort, order] = document.getElementById('sort-select').value.split(':');
            const limit = 50;
            const offset = (page - 1) * limit;

            try {
                const params = new URLSearchParams({ limit, offset, search, sort, order });
                if (subcategory) params.set('subcategory', subcategory);
                if (brand) params.set('brand', brand);
                const { products, brands, subcategories } = await api(`/products?${params}`);
                allBrands = brands;
                allSubcategories = subcategories;
                updateFilters();

                document.getElementById('result-count').textContent = `共 ${products.length} 个产品`;

                if (currentView === 'list') {
                    renderListView(products);
                } else {
                    renderGridView(products);
                }

                renderPagination(page);
            } catch (err) {
                console.error(err);
                document.getElementById('result-count').textContent = '加载失败';
            }
        }

        function renderListView(products) {
            const tbody = document.querySelector('#products-table tbody');
            if (!products.length) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)">无产品数据</td></tr>`;
                return;
            }
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td>${p.image_url ? `<img src="/api/proxy/image?url=${encodeURIComponent(p.image_url)}" alt="" class="product-thumb-sm" onerror="this.style.display='none'">` : '<span style="color:var(--text-muted);font-size:11px">无图</span>'}</td>
                    <td><code class="sku-code">${p.external_id}</code></td>
                    <td><span class="product-name-cell" title="${escHtml(p.name)}">${escHtml(p.name)}</span></td>
                    <td>${p.brand ? `<span class="tag tag-brand">${escHtml(p.brand)}</span>` : '-'}</td>
                    <td><span class="price-cell">${p.price || '-'}</span></td>
                    <td>${p.subcategory ? `<span class="tag">${t(p.subcategory)}</span>` : '-'}</td>
                    <td>${formatDateShort(p.first_seen_at)}</td>
                </tr>
            `).join('');
        }

        function renderGridView(products) {
            const container = document.getElementById('grid-view');
            if (!products.length) {
                container.innerHTML = `<div class="empty-state"><p>无产品数据</p></div>`;
                return;
            }
            container.innerHTML = products.map(p => `
                <div class="grid-product-card">
                    <div class="grid-card-img">
                        ${p.image_url ? `<img src="/api/proxy/image?url=${encodeURIComponent(p.image_url)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
                        <div class="grid-card-img-fallback" style="${p.image_url ? 'display:none' : ''}">
                            <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 15l-5-5L5 21"/></svg>
                        </div>
                    </div>
                    <div class="grid-card-body">
                        <div class="grid-card-sku">SKU: ${p.external_id}</div>
                        <div class="grid-card-name" title="${escHtml(p.name)}">${escHtml(p.name)}</div>
                        <div class="grid-card-meta">
                            ${p.brand ? `<span class="tag tag-brand">${escHtml(p.brand)}</span>` : ''}
                            ${p.subcategory ? `<span class="tag">${t(p.subcategory)}</span>` : ''}
                        </div>
                        <div class="grid-card-footer">
                            <span class="grid-card-price">${p.price || '-'}</span>
                            <span class="grid-card-date">${formatDateShort(p.first_seen_at)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateFilters() {
            const brandSelect = document.getElementById('brand-filter');
            const currentBrand = brandSelect.value;
            let html = '<option value="">全部品牌</option>';
            for (const b of allBrands) {
                html += `<option value="${escHtml(b)}" ${b === currentBrand ? 'selected' : ''}>${escHtml(b)}</option>`;
            }
            brandSelect.innerHTML = html;

            const subSelect = document.getElementById('subcategory-filter');
            const currentSub = subSelect.value;
            html = '<option value="">全部子分类</option>';
            for (const sc of allSubcategories) {
                html += `<option value="${escHtml(sc)}" ${sc === currentSub ? 'selected' : ''}>${t(sc)}</option>`;
            }
            subSelect.innerHTML = html;
        }

        function renderPagination(page) {
            document.getElementById('pagination').innerHTML = `
                <button class="btn btn-outline btn-sm" ${page <= 1 ? 'disabled' : ''} onclick="loadProducts(${page - 1})">上一页</button>
                <span style="padding:0 12px;font-size:13px;color:var(--text-muted)">第 ${page} 页</span>
                <button class="btn btn-outline btn-sm" onclick="loadProducts(${page + 1})">下一页</button>
            `;
        }

        document.getElementById('search-input').addEventListener('input', debounce(() => loadProducts(), 300));
        document.getElementById('brand-filter').addEventListener('change', () => loadProducts());
        document.getElementById('subcategory-filter').addEventListener('change', () => loadProducts());
        document.getElementById('sort-select').addEventListener('change', () => loadProducts());

        function debounce(fn, ms) {
            let t;
            return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
        }

        loadProducts();
    </script>
</body>
</html>
